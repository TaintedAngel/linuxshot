<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Camera body -->
  <rect x="4" y="18" width="56" height="38" rx="6" ry="6" fill="#3daee9" stroke="#1d99f3" stroke-width="2"/>
  <!-- Camera top bump -->
  <rect x="20" y="10" width="18" height="10" rx="3" ry="3" fill="#3daee9" stroke="#1d99f3" stroke-width="2"/>
  <!-- Lens outer ring -->
  <circle cx="32" cy="36" r="14" fill="#1d1d1d" stroke="#1d99f3" stroke-width="2"/>
  <!-- Lens inner -->
  <circle cx="32" cy="36" r="9" fill="#2d2d2d"/>
  <!-- Lens highlight -->
  <circle cx="32" cy="36" r="5" fill="#4d4d4d"/>
  <circle cx="29" cy="33" r="2" fill="#ffffff" opacity="0.6"/>
  <!-- Flash -->
  <circle cx="49" cy="23" r="3" fill="#fdbc4b"/>
  <!-- Crosshair (screenshot selection indicator) -->
  <line x1="32" y1="28" x2="32" y2="44" stroke="#27ae60" stroke-width="1.5" opacity="0.8"/>
  <line x1="24" y1="36" x2="40" y2="36" stroke="#27ae60" stroke-width="1.5" opacity="0.8"/>
</svg>
